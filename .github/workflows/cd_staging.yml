name: Deploy to staging

on:
  push:
    branches: [main]
jobs:
  redeploy_everything:
     runs-on: ubuntu-latest
     name: Deploying everything to the staging cluster
     steps:
       - run: |
            printf '%s\n' "${{ secrets.SSH_PRIVATE_KEY }}" > "$HOME/ssh_key"
            chmod 600 "$HOME/ssh_key"

            mkdir -p "$HOME/.ssh"
            printf '%s\n' "${{ secrets.SSH_KNOWN_HOSTS }}" > "$HOME/.ssh/known_hosts"
            chmod 600 "$HOME/.ssh/known_hosts"
            ssh -i ~/ssh_key root@142.93.247.236
            cd week-deployment/Devops/bms && git pull
            pnpm install
            pnpm run build
            pm2 restart http-server
            pm2 restart nextjs
            pm2 restart web-socket



