name: Deploy to staging

on:
  push:
    branches: [main]
jobs:
  redeploy_everything:
     runs-on: ubuntu-latest
     name: Deploying everything to the staging cluster
     steps:
       - run: |
            echo "${{secrets.SSH_SECRET_KEY_WINDOWS}}" &> ~/ssh_key
            mkdir -p /home/runner/.ssh
            ls /home/runner/.ssh
            touch /home/runner/.ssh/known_hosts
            echo "${{secrets.KNOWN_HOSTS}}" &> /home/runner/.ssh/known_hosts
            chmod 700 /home/runner/ssh_key
            ssh -i ~/ssh_key root@142.93.247.236 -t "cd week-deployment/ && git pull origin main && export PATH=/root/.nvm/versions/node/v24.18.0/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin:/usr/games:/usr/local/games:/snap/bin && 
            npm i -g pnpm && pnpm install && cd packages/prisma &&
            pnpm exec prisma generate &&
            cd ../.. &&
            cp packages/prisma/.env apps/web/.env.local &&
            pnpm run build &&
            pm2 restart http-server && pm2 restart nextjs && pm2 restart web-socket"



